<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tiny Steps Wild Path — Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&auto=format&fit=crop') center/cover no-repeat;
      z-index: 0;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.60);
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 clamp(16px, 5vw, 60px);
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 20px;
    }

    .hamburger {
      font-size: 1.6rem;
      cursor: pointer;
      background: none;
      border: none;
      color: #fff;
      line-height: 1;
      transition: opacity .2s;
    }
    .hamburger:hover { opacity: .7; }

    .logo-icon {
      font-size: 1.5rem;
      color: #fff;
      user-select: none;
      letter-spacing: 0.05em;
    }

    .lang-switch {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.85);
    }
    .lang-switch span {
      cursor: pointer;
      transition: color .2s;
    }
    .lang-switch span:hover { color: #fff; }
    .lang-switch .active { color: #fff; }
    .lang-switch .sep { color: rgba(255,255,255,0.4); margin: 0 4px; }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 0;
    }

    .coming-soon {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(52px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .subtitle {
      margin-top: 14px;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-style: italic;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.04em;
    }

    /* ── COUNTDOWN ── */
    .countdown-wrap {
      margin-top: clamp(30px, 5vh, 50px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .countdown {
      display: flex;
      align-items: flex-start;
      gap: clamp(8px, 2.5vw, 24px);
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: clamp(48px, 9vw, 90px);
    }

    .time-number {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .time-label {
      margin-top: 6px;
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.55rem, 1.2vw, 0.78rem);
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    .colon {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2rem, 5.5vw, 4.5rem);
      font-weight: 700;
      line-height: 1;
      padding-top: 0;
      color: rgba(255,255,255,0.6);
      user-select: none;
    }

    .owl-text {
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      font-style: italic;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.03em;
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 30px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .social-links {
      display: flex;
      gap: 10px;
    }

    .social-btn {
      width: 38px;
      height: 38px;
      border: 1.5px solid rgba(255,255,255,0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
      font-size: 0.85rem;
      text-decoration: none;
      transition: border-color .2s, color .2s, background .2s;
    }
    .social-btn:hover {
      border-color: #fff;
      color: #fff;
      background: rgba(255,255,255,0.12);
    }

    .credit {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }

    .newsletter {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .newsletter-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .newsletter-form {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .newsletter-input {
      background: none;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.45);
      color: rgba(255,255,255,0.85);
      font-family: 'Open Sans', sans-serif;
      font-size: 0.82rem;
      font-style: italic;
      padding: 4px 2px;
      width: 170px;
      outline: none;
      transition: border-color .2s;
    }
    .newsletter-input::placeholder { color: rgba(255,255,255,0.45); }
    .newsletter-input:focus { border-bottom-color: rgba(255,255,255,0.85); }

    .mail-btn {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(255,255,255,0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
      font-size: 0.82rem;
      cursor: pointer;
      background: none;
      transition: border-color .2s, color .2s, background .2s;
    }
    .mail-btn:hover {
      border-color: #fff;
      color: #fff;
      background: rgba(255,255,255,0.12);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      body { overflow-y: auto; }
      footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .newsletter { align-items: center; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>

  <div class="page">

    <!-- Header -->
    <header>
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <div class="logo-icon">&#9661;</div>
      <div class="lang-switch">
        <span class="active">ENG</span>
        <span class="sep">/</span>
        <span>RUS</span>
      </div>
    </header>

    <!-- Hero -->
    <main class="hero">
      <h1 class="coming-soon">Coming Soon</h1>
      <p class="subtitle">There will be something very awesome</p>

      <!-- Countdown -->
      <div class="countdown-wrap">
        <div class="countdown">
          <div class="time-block">
            <span class="time-number" id="cd-days">00</span>
            <span class="time-label">Days</span>
          </div>
          <span class="colon">:</span>
          <div class="time-block">
            <span class="time-number" id="cd-hours">00</span>
            <span class="time-label">Hours</span>
          </div>
          <span class="colon">:</span>
          <div class="time-block">
            <span class="time-number" id="cd-minutes">00</span>
            <span class="time-label">Minutes</span>
          </div>
          <span class="colon">:</span>
          <div class="time-block">
            <span class="time-number" id="cd-seconds">00</span>
            <span class="time-label">Seconds</span>
          </div>
        </div>
        <p class="owl-text">... as awesome as these owls.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <!-- Social icons -->
      <div class="social-links">
        <a href="#" class="social-btn" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social-btn" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-btn" aria-label="Twitter"><i class="fab fa-x-twitter"></i></a>
      </div>

      <!-- Credit -->
      <p class="credit">Created by WILDPATH</p>

      <!-- Newsletter -->
      <div class="newsletter">
        <span class="newsletter-label">Subscribe to our newsletter</span>
        <form class="newsletter-form" id="newsletter-form" novalidate>
          <input
            class="newsletter-input"
            type="email"
            id="newsletter-email"
            placeholder="example@mail.com"
            aria-label="Email address"
            required
          >
          <button class="mail-btn" type="submit" aria-label="Subscribe"><i class="fas fa-envelope"></i></button>
        </form>
      </div>
    </footer>

  </div>

  <script>
    // Target date: 60 days from 2026-03-20
    const target = new Date('2026-05-19T00:00:00');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateCountdown() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('cd-days').textContent    = '00';
        document.getElementById('cd-hours').textContent   = '00';
        document.getElementById('cd-minutes').textContent = '00';
        document.getElementById('cd-seconds').textContent = '00';
        return;
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('cd-days').textContent    = pad(days);
      document.getElementById('cd-hours').textContent   = pad(hours);
      document.getElementById('cd-minutes').textContent = pad(minutes);
      document.getElementById('cd-seconds').textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Hamburger menu toggle
    const hamburger = document.querySelector('.hamburger');
    hamburger.addEventListener('click', function () {
      const expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', String(!expanded));
      this.textContent = expanded ? '\u2630' : '\u2715';
    });

    // Newsletter form submission
    document.getElementById('newsletter-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const emailInput = document.getElementById('newsletter-email');
      const email = emailInput.value.trim();
      if (!email) return;
      emailInput.value = '';
      emailInput.placeholder = 'Thank you for subscribing!';
      setTimeout(function () {
        emailInput.placeholder = 'example@mail.com';
      }, 3000);
    });
  </script>

</body>
</html>
